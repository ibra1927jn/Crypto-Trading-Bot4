program: train_ai.py
method: bayes
metric:
  name: val/loss
  goal: minimize
parameters:
  epochs:
    value: 50  # Menos épocas para probar más combinaciones rápido
  batch_size:
    values: [1024, 2048, 4096]
  learning_rate:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-3
  dropout:
    values: [0.1, 0.2, 0.3, 0.4]
  num_layers:
    values: [2, 3, 4, 6]
  nhead:
    values: [4, 8]
  d_model:
    values: [64, 128, 256]
  weight_decay:
    values: [1e-3, 1e-4, 1e-5]
  early_stop_patience:
    value: 10
early_terminate:
  type: hyperband
  min_iter: 5